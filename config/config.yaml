# TrendRadar 热点抓取配置（含多平台+飞书推送）
# 支持平台：微博、知乎、小红书、头条、抖音、B站、百度、澎湃、财联社、贴吧

# 1. 基础设置
app:
  timezone: "Asia/Shanghai"
  language: "zh-CN"

# 2. 抓取平台列表（可按需要增减）
platforms:
  - weibo      # 微博热搜
  - zhihu      # 知乎热榜
  - xiaohongshu # 小红书热门
  - toutiao    # 今日头条
  - douyin     # 抖音热搜
  - bilibili   # B站热搜
  - baidu      # 百度热搜
  - thepaper   # 澎湃新闻
  - cls        # 财联社
  - tieba      # 百度贴吧

# 3. 抓取设置
crawler:
  timeout: 15
  retry: 2
  interval: 300

# 4. 输出格式设置
output:
  format: markdown
  path: ./输出/热点汇总.md
  include_link: true
  include_hot: true

# 5. 推送配置（读取你之前存的飞书Secret）
push:
  feishu:
    webhook: "${{ secrets.FEISHU_WEBHOOK }}"
    at_all: false

# 6. 过滤设置（可选，保留所有话题）
filter:
  keywords: []
  exclude_keywords: []
